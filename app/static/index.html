<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LangChain Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #08080f;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.07);
  --text: #e8e8f0;
  --muted: #5a5a78;
  --accent: #7c6ff7;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Animated background gradient ── */
.bg-gradient {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(99,80,220,0.18) 0%, transparent 60%),
              radial-gradient(ellipse 60% 80% at 80% 70%, rgba(139,80,200,0.14) 0%, transparent 60%),
              radial-gradient(ellipse 50% 50% at 50% 50%, rgba(60,40,120,0.10) 0%, transparent 70%);
  animation: bgshift 12s ease-in-out infinite alternate;
}
@keyframes bgshift {
  0%   { opacity: 1; transform: scale(1) rotate(0deg); }
  50%  { opacity: 0.85; transform: scale(1.08) rotate(2deg); }
  100% { opacity: 1; transform: scale(1.04) rotate(-1deg); }
}

/* ── Header ── */
.header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px;
}
.header-name {
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.35);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.new-btn {
  font-size: 11px; font-weight: 500; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 20px; cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.02em;
}
.new-btn:hover { color: var(--text); border-color: rgba(124,111,247,0.4); }

/* ── Home screen ── */
#home {
  position: relative; z-index: 5;
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 40px;
  padding-bottom: 20px;
}

/* ── Orb ── */
.orb-wrap {
  position: relative;
  width: 200px; height: 200px;
  display: flex; align-items: center; justify-content: center;
}
.orb-glow {
  position: absolute; inset: -30px; border-radius: 50%;
  background: radial-gradient(circle, rgba(100,80,240,0.25) 0%, transparent 70%);
  animation: glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.15); }
}

.orb {
  width: 160px; height: 160px; border-radius: 50%;
  position: relative; overflow: hidden;
  box-shadow:
    0 0 60px rgba(100,80,240,0.4),
    0 0 120px rgba(100,80,240,0.15),
    inset 0 0 40px rgba(255,255,255,0.05);
  transition: transform 0.3s ease;
}
.orb:hover { transform: scale(1.04); }

/* Marble layers */
.orb-base {
  position: absolute; inset: 0; border-radius: 50%;
  background:
    radial-gradient(ellipse 60% 80% at 30% 20%, rgba(140,100,255,0.9) 0%, transparent 50%),
    radial-gradient(ellipse 80% 60% at 70% 80%, rgba(80,60,200,0.8) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, #1a0a3a 0%, #0d0520 100%);
  animation: marble-rotate 8s linear infinite;
}
.orb-swirl {
  position: absolute; inset: 0; border-radius: 50%;
  background:
    radial-gradient(ellipse 40% 70% at 20% 60%, rgba(180,130,255,0.5) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 80% 30%, rgba(100,180,255,0.3) 0%, transparent 50%),
    radial-gradient(ellipse 30% 50% at 60% 70%, rgba(200,100,255,0.35) 0%, transparent 45%);
  animation: marble-swirl 12s ease-in-out infinite alternate;
  mix-blend-mode: screen;
}
.orb-shimmer {
  position: absolute; inset: 0; border-radius: 50%;
  background:
    radial-gradient(ellipse 30% 30% at 35% 30%, rgba(255,255,255,0.18) 0%, transparent 50%),
    radial-gradient(ellipse 15% 15% at 55% 25%, rgba(255,255,255,0.12) 0%, transparent 50%);
  animation: shimmer 5s ease-in-out infinite alternate;
}
.orb-edge {
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.6) 100%);
}

@keyframes marble-rotate {
  from { transform: rotate(0deg) scale(1.1); }
  to   { transform: rotate(360deg) scale(1.1); }
}
@keyframes marble-swirl {
  0%   { transform: rotate(-20deg) scale(1.2); opacity: 0.7; }
  100% { transform: rotate(40deg) scale(1.3); opacity: 1; }
}
@keyframes shimmer {
  0%   { opacity: 0.6; transform: translate(-5%, -5%); }
  100% { opacity: 1;   transform: translate(5%, 5%); }
}

/* Thinking state */
.orb.thinking .orb-base {
  animation: marble-rotate 3s linear infinite, thinking-pulse 1.5s ease-in-out infinite;
}
@keyframes thinking-pulse {
  0%,100% { filter: brightness(1); }
  50%      { filter: brightness(1.4) saturate(1.3); }
}
.orb.thinking .orb-glow-ring {
  animation: ring-spin 1s linear infinite;
}

/* Outer ring */
.orb-ring {
  position: absolute; inset: -6px; border-radius: 50%;
  border: 1px solid rgba(124,111,247,0.25);
  animation: ring-breathe 3s ease-in-out infinite;
}
.orb-ring-2 {
  position: absolute; inset: -14px; border-radius: 50%;
  border: 1px solid rgba(124,111,247,0.1);
  animation: ring-breathe 3s ease-in-out infinite 0.5s;
}
@keyframes ring-breathe {
  0%,100% { opacity: 0.4; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.03); }
}

/* ── Home input ── */
.home-input-wrap {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 50px; padding: 12px 16px 12px 22px;
  width: 420px; max-width: 90vw;
  backdrop-filter: blur(12px);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.home-input-wrap:focus-within {
  border-color: rgba(124,111,247,0.5);
  box-shadow: 0 0 0 3px rgba(124,111,247,0.08);
}
.home-input-wrap input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 400;
}
.home-input-wrap input::placeholder { color: var(--muted); }
.home-send {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #7c6ff7, #9b5cf6);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; opacity: 0.4;
  box-shadow: 0 2px 12px rgba(124,111,247,0.3);
}
.home-send.ready { opacity: 1; }
.home-send:hover.ready { transform: scale(1.08); box-shadow: 0 4px 20px rgba(124,111,247,0.5); }
.home-send svg { width: 14px; height: 14px; fill: white; margin-left: 1px; }

/* ── Chat view ── */
#chat-view {
  position: relative; z-index: 5;
  flex: 1; display: none; flex-direction: column;
  height: calc(100vh - 60px);
}

.messages {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 16px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

.msg { display: flex; gap: 10px; max-width: 680px; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.msg.user .msg-avatar {
  background: linear-gradient(135deg, #7c6ff7, #9b5cf6);
}
.msg.assistant .msg-avatar {
  background: var(--surface); border: 1px solid var(--border);
  overflow: hidden;
}
.mini-orb {
  width: 100%; height: 100%;
  background:
    radial-gradient(ellipse 60% 80% at 30% 20%, rgba(140,100,255,0.9), transparent 60%),
    radial-gradient(circle at 50% 50%, #1a0a3a, #0d0520);
  animation: marble-rotate 8s linear infinite;
}

.msg-bubble {
  padding: 11px 15px; border-radius: 16px;
  font-size: 14px; line-height: 1.65; max-width: calc(100% - 40px);
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, rgba(124,111,247,0.85), rgba(155,92,246,0.85));
  color: #fff; border-bottom-right-radius: 4px;
  backdrop-filter: blur(8px);
}
.msg.assistant .msg-bubble {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  color: #d8d8e8; border-bottom-left-radius: 4px;
  backdrop-filter: blur(8px);
}

/* Tool chips */
.tools { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.tool-chip {
  font-size: 10px; font-weight: 500; letter-spacing: 0.03em;
  padding: 2px 8px; border-radius: 20px; text-transform: uppercase;
  background: rgba(124,111,247,0.1); border: 1px solid rgba(124,111,247,0.25);
  color: rgba(180,170,255,0.8);
  display: flex; align-items: center; gap: 4px;
}
.tool-chip.running { animation: chip-pulse 1s ease-in-out infinite; }
.tool-chip.done { background: rgba(74,222,128,0.08); border-color: rgba(74,222,128,0.2); color: rgba(134,239,172,0.8); }
@keyframes chip-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Thinking dots */
.dots { display: flex; align-items: center; gap: 4px; padding: 2px 0; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: dot-bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.15s; }
.dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes dot-bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

/* Cursor blink */
.cursor {
  display: inline-block; width: 2px; height: 13px;
  background: rgba(200,190,255,0.6); margin-left: 1px;
  vertical-align: middle; animation: cur-blink 0.7s infinite;
}
@keyframes cur-blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Chat input bar ── */
.chat-input-area {
  padding: 12px 24px 16px;
  border-top: 1px solid var(--border);
}
.chat-input-wrap {
  display: flex; align-items: flex-end; gap: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 16px; padding: 10px 12px;
  max-width: 680px; margin: 0 auto;
  backdrop-filter: blur(12px);
  transition: border-color 0.2s;
}
.chat-input-wrap:focus-within { border-color: rgba(124,111,247,0.45); }
.chat-input-wrap textarea {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; resize: none; max-height: 100px; line-height: 1.5;
}
.chat-input-wrap textarea::placeholder { color: var(--muted); }
.chat-send {
  width: 30px; height: 30px; border-radius: 8px; border: none;
  background: linear-gradient(135deg, #7c6ff7, #9b5cf6);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s; opacity: 0.35;
}
.chat-send.ready { opacity: 1; }
.chat-send:hover.ready { transform: scale(1.08); }
.chat-send svg { width: 13px; height: 13px; fill: white; margin-left: 1px; }

/* ── Transition ── */
.fade-out { animation: fade-out 0.35s forwards; }
@keyframes fade-out { to { opacity: 0; transform: scale(0.96); } }
.fade-in { animation: fade-in 0.35s forwards; }
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="bg-gradient"></div>

<!-- Header -->
<div class="header">
  <span class="header-name">LangChain Agent</span>
  <button class="new-btn" onclick="newChat()">New chat</button>
</div>

<!-- Home screen -->
<div id="home">
  <div class="orb-wrap">
    <div class="orb-glow"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring-2"></div>
    <div class="orb" id="orb">
      <div class="orb-base"></div>
      <div class="orb-swirl"></div>
      <div class="orb-shimmer"></div>
      <div class="orb-edge"></div>
    </div>
  </div>

  <div class="home-input-wrap">
    <input type="text" id="home-input" placeholder="Ask anything…" onkeydown="homeKey(event)" oninput="homeInputChange(this)">
    <button class="home-send" id="home-send" onclick="homeSubmit()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- Chat view -->
<div id="chat-view">
  <div class="messages" id="messages"></div>
  <div class="chat-input-area">
    <div class="chat-input-wrap">
      <textarea id="chat-input" placeholder="Message…" rows="1"
        onkeydown="chatKey(event)" oninput="chatInputChange(this)"></textarea>
      <button class="chat-send" id="chat-send" onclick="chatSubmit()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
let threadId = crypto.randomUUID();
let streaming = false;

// Tool name mapping
const TOOL_LABELS = {
  duckduckgo_search: 'Search',
  duck_duck_go_search: 'Search',
  web_search: 'Search',
  calculator: 'Calc',
  get_current_datetime: 'Time',
};
function toolLabel(name) {
  return TOOL_LABELS[name] || name.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
}

// ── Home input ──
function homeInputChange(el) {
  document.getElementById('home-send').classList.toggle('ready', el.value.trim().length > 0);
}
function homeKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); homeSubmit(); }
}
function homeSubmit() {
  const val = document.getElementById('home-input').value.trim();
  if (!val) return;
  transitionToChat(val);
}

// ── Chat input ──
function chatInputChange(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  document.getElementById('chat-send').classList.toggle('ready', el.value.trim().length > 0);
}
function chatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatSubmit(); }
}
function chatSubmit() {
  const ta = document.getElementById('chat-input');
  const val = ta.value.trim();
  if (!val || streaming) return;
  ta.value = ''; ta.style.height = 'auto';
  document.getElementById('chat-send').classList.remove('ready');
  sendMessage(val);
}

// ── Transition home → chat ──
function transitionToChat(firstMsg) {
  const home = document.getElementById('home');
  const chatView = document.getElementById('chat-view');
  home.classList.add('fade-out');
  setTimeout(() => {
    home.style.display = 'none';
    chatView.style.display = 'flex';
    chatView.classList.add('fade-in');
    sendMessage(firstMsg);
  }, 300);
}

// ── New chat ──
function newChat() {
  threadId = crypto.randomUUID();
  streaming = false;
  const home = document.getElementById('home');
  const chatView = document.getElementById('chat-view');
  const messages = document.getElementById('messages');
  const orb = document.getElementById('orb');
  messages.innerHTML = '';
  chatView.style.display = 'none';
  chatView.classList.remove('fade-in');
  home.style.display = 'flex';
  home.style.opacity = '';
  home.classList.remove('fade-out');
  document.getElementById('home-input').value = '';
  document.getElementById('home-send').classList.remove('ready');
  orb.classList.remove('thinking');
}

// ── Add message bubble ──
function addMsg(role, text = '', tools = []) {
  const messages = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  if (role === 'assistant') {
    const mini = document.createElement('div');
    mini.className = 'mini-orb';
    avatar.appendChild(mini);
  } else {
    avatar.textContent = '→';
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (tools.length) {
    const tc = document.createElement('div');
    tc.className = 'tools';
    tc.id = 'tool-chips';
    tools.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'tool-chip running';
      chip.dataset.tool = t;
      chip.textContent = `● ${toolLabel(t)}`;
      tc.appendChild(chip);
    });
    bubble.appendChild(tc);
  }

  const textEl = document.createElement('span');
  textEl.className = 'msg-text';
  textEl.textContent = text;
  bubble.appendChild(textEl);

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
  return { bubble, textEl };
}

// ── Thinking indicator ──
function addThinking() {
  const messages = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.id = 'thinking-msg';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  const mini = document.createElement('div');
  mini.className = 'mini-orb';
  avatar.appendChild(mini);

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

// ── Send message ──
async function sendMessage(text) {
  streaming = true;
  const orb = document.getElementById('orb');

  addMsg('user', text);
  orb.classList.add('thinking');
  addThinking();

  let msgCtx = null;
  let initialized = false;

  try {
    const resp = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, thread_id: threadId })
    });

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
          const d = JSON.parse(raw);
          if (d.thread_id) { threadId = d.thread_id; continue; }

          if (d.tool_start) {
            if (!initialized) {
              document.getElementById('thinking-msg')?.remove();
              msgCtx = addMsg('assistant', '', [d.tool_start]);
              initialized = true;
            } else {
              const tc = document.getElementById('tool-chips');
              if (tc) {
                const chip = document.createElement('span');
                chip.className = 'tool-chip running';
                chip.dataset.tool = d.tool_start;
                chip.textContent = `● ${toolLabel(d.tool_start)}`;
                tc.appendChild(chip);
              }
            }
          }

          if (d.tool_end) {
            const chip = document.querySelector(`.tool-chip[data-tool="${d.tool_end}"]`);
            if (chip) { chip.className = 'tool-chip done'; chip.textContent = `✓ ${toolLabel(d.tool_end)}`; }
          }

          if (d.token) {
            if (!initialized) {
              document.getElementById('thinking-msg')?.remove();
              msgCtx = addMsg('assistant');
              initialized = true;
            }
            const cur = msgCtx.bubble.querySelector('.cursor');
            if (cur) cur.remove();
            msgCtx.textEl.textContent += d.token;
            const c = document.createElement('span');
            c.className = 'cursor';
            msgCtx.bubble.appendChild(c);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
          }

          if (d.error) {
            document.getElementById('thinking-msg')?.remove();
            addMsg('assistant', 'Something went wrong. Try again.');
          }
        } catch {}
      }
    }

    msgCtx?.bubble.querySelector('.cursor')?.remove();
    document.getElementById('thinking-msg')?.remove();

  } catch {
    document.getElementById('thinking-msg')?.remove();
    addMsg('assistant', 'Connection error. Try again.');
  }

  orb.classList.remove('thinking');
  streaming = false;
  setTimeout(() => document.getElementById('chat-input')?.focus(), 50);
}
</script>
</body>
</html>
